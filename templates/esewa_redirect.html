<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting to eSewa...</title>
  <style>
    body { font-family: sans-serif; display: flex; flex-direction: column;
           align-items: center; justify-content: center; min-height: 100vh;
           background: #f9fafb; margin: 0; }
    .card { background: white; border-radius: 12px; padding: 40px 32px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08); text-align: center; max-width: 380px; }
    .esewa-logo { font-size: 2.5rem; margin-bottom: 12px; }
    h2 { margin: 0 0 8px; font-size: 20px; color: #1a1a1a; }
    p  { color: #6b7280; font-size: 14px; margin: 0 0 24px; }
    .spinner { width: 36px; height: 36px; border: 4px solid #e5e7eb;
               border-top-color: #60bb46; border-radius: 50%;
               animation: spin 0.8s linear infinite; margin: 0 auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="esewa-logo">💚</div>
    <h2>Redirecting to eSewa</h2>
    <p>Please wait — you're being securely redirected to complete your payment.</p>
    <div class="spinner"></div>
  </div>

  <form id="esewa-form" action="{{ esewa_url }}" method="POST" style="display:none;">
    <input type="hidden" name="amount"                   value="{{ amount }}">
    <input type="hidden" name="tax_amount"               value="{{ tax_amount }}">
    <input type="hidden" name="total_amount"             value="{{ total_amount }}">
    <input type="hidden" name="transaction_uuid"         value="{{ transaction_uuid }}">
    <input type="hidden" name="product_code"             value="{{ product_code }}">
    <input type="hidden" name="product_service_charge"   value="{{ product_service_charge }}">
    <input type="hidden" name="product_delivery_charge"  value="{{ product_delivery_charge }}">
    <input type="hidden" name="success_url"              value="{{ success_url }}">
    <input type="hidden" name="failure_url"              value="{{ failure_url }}">
    <input type="hidden" name="signed_field_names"       value="{{ signed_field_names }}">
    <input type="hidden" name="signature"                value="{{ signature }}">
  </form>

  <script>
    window.onload = function() {
      setTimeout(function() {
        document.getElementById('esewa-form').submit();
      }, 800);
    };
  </script>
</body>
</html>
