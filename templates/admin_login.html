<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login - PrintCraft 3D</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>

<div class="admin-login-page">
  <div class="admin-login-card">

    <div class="admin-login-logo">
      <div class="logo-icon">🖨️</div>
      <h2>Admin Panel</h2>
      <p style="color:var(--text-muted);font-size:14px;">D Design Management</p>
    </div>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash flash-{{ category }}" style="margin-bottom:16px;">
          {% if category == 'error' %}❌{% else %}ℹ️{% endif %} {{ message }}
        </div>
      {% endfor %}
    {% endwith %}

    <form action="{{ url_for('admin_login') }}" method="POST">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:8px;">
        🔐 Login
      </button>
    </form>

    <p style="text-align:center;margin-top:20px;font-size:13px;color:var(--text-muted);">
      Default: admin / admin123
    </p>

    <div style="text-align:center;margin-top:12px;">
      <a href="{{ url_for('index') }}" style="font-size:13px;color:var(--text-muted);">← Back to Store</a>
    </div>

  </div>
</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
